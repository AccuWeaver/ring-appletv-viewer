# Docker Compose stack for local Ring Partner API testing and real-account dev.
#
# Services:
#   backend         — Python/FastAPI backend; pluggable adapter (mock or unofficial)
#   mediamtx        — WebRTC/RTSP media server
#   ring-sip-bridge — Node.js sidecar that negotiates Ring SIP sessions and
#                     republishes RTP as RTSP into mediamtx (only exercised
#                     when `RING_ADAPTER=unofficial`)
#   ffmpeg          — Test pattern generator. Only started when the ``mock``
#                     profile is active: `docker compose --profile mock up`.
#
# Usage:
#   docker compose up -d                       # mock or unofficial (no test pattern)
#   docker compose --profile mock up -d        # mock with ffmpeg test pattern
#   docker compose logs -f                     # tail logs
#   docker compose down                        # stop everything

services:
  backend:
    build:
      context: ./partner-auth-backend
    container_name: ring-partner-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Local dev credentials (not real Ring credentials).
      RING_CLIENT_ID: local_dev_client_id
      RING_CLIENT_SECRET: local_dev_client_secret
      RING_HMAC_KEY: 5E5CqTiFx16SS2V7Ipak1nvTBKQPaXipDLCjgjSj+Nk=
      APP_API_KEY: local-dev-api-key
      TOKEN_ENCRYPTION_KEY: z-6mRAl-NHWoVYqHFG_sEjGk9iy2lpnWyDWDpVBy-u0=
      DATABASE_PATH: /data/tokens.db
      LOG_LEVEL: INFO

      # Adapter selection (Req 7.1). Defaults to "mock" so `docker compose up`
      # works without any Ring credentials. Set to "unofficial" in an `.env`
      # file alongside this compose stack to drive a real Ring account.
      RING_ADAPTER: ${RING_ADAPTER:-mock}
      RING_REFRESH_TOKEN: ${RING_REFRESH_TOKEN:-}
      RING_MAX_CONCURRENT_STREAMS: ${RING_MAX_CONCURRENT_STREAMS:-2}
      RING_API_RATE_LIMIT_PER_MINUTE: ${RING_API_RATE_LIMIT_PER_MINUTE:-60}

      # Mock adapter's WHEP URL (reads from the ffmpeg test pattern). Unused
      # by the unofficial adapter, which assembles its own path from
      # MEDIAMTX_WHEP_BASE + the sidecar's rtsp_path.
      MEDIAMTX_WHEP_URL: ${MEDIAMTX_WHEP_URL:-http://mediamtx:8889/test/whep}

      # Unofficial adapter endpoints.
      MEDIAMTX_RTSP_URL: ${MEDIAMTX_RTSP_URL:-rtsp://mediamtx:8554/ring}
      MEDIAMTX_WHEP_BASE: ${MEDIAMTX_WHEP_BASE:-http://mediamtx:8889}
      # Public HLS base URL the simulator can reach from the host. The
      # backend returns HLS URLs using this prefix so clients bypass the
      # Docker-internal hostname. Override per environment as needed.
      MEDIAMTX_HLS_PUBLIC_BASE: ${MEDIAMTX_HLS_PUBLIC_BASE:-http://localhost:8888}

      # go2rtc native Ring → HLS bridge
      GO2RTC_URL: ${GO2RTC_URL:-http://go2rtc:1984}
      # Publicly-reachable go2rtc base URL for clients. The backend
      # returns HLS URLs using this prefix so the tvOS simulator can
      # resolve them from the host network.
      GO2RTC_PUBLIC_URL: ${GO2RTC_PUBLIC_URL:-http://localhost:1984}
      # Base64-encoded AuthConfig envelope for go2rtc. Generate with:
      #   echo "$RING_REFRESH_TOKEN" | uv run python scripts/wrap-ring-token.py
      RING_REFRESH_TOKEN_G2R: ${RING_REFRESH_TOKEN_G2R:-}
      # Optional TURN/STUN override for go2rtc's Ring source — requires
      # a patched go2rtc build (see docs/simulator-live-video.md). JSON
      # array of RTCIceServer objects. Empty = use go2rtc defaults.
      GO2RTC_RING_ICE_SERVERS: ${GO2RTC_RING_ICE_SERVERS:-}
      # ``relay`` forces TURN; empty/``all`` lets pion choose.
      GO2RTC_RING_ICE_TRANSPORT_POLICY: ${GO2RTC_RING_ICE_TRANSPORT_POLICY:-}
      RING_SIP_BRIDGE_URL: ${RING_SIP_BRIDGE_URL:-http://ring-sip-bridge:3000}
      # Public URL of the sidecar as seen by external clients (the tvOS
      # simulator runs on the host and talks to the sidecar over its
      # published port).
      RING_SIP_BRIDGE_PUBLIC_URL: ${RING_SIP_BRIDGE_PUBLIC_URL:-http://localhost:3000}

      # Source routing profile (Req 9.1). Comma-separated ordered list of
      # adapter modes to try. Empty string falls back to RING_ADAPTER.
      RING_ADAPTER_ROUTING: ${RING_ADAPTER_ROUTING:-}

      # Snapshot cache TTL and refresh settings (Req 9.5).
      SNAPSHOT_TTL_FRESH_SECONDS: ${SNAPSHOT_TTL_FRESH_SECONDS:-60}
      SNAPSHOT_TTL_STALE_SERVE_SECONDS: ${SNAPSHOT_TTL_STALE_SERVE_SECONDS:-600}
      SNAPSHOT_REFRESH_INTERVAL_SECONDS: ${SNAPSHOT_REFRESH_INTERVAL_SECONDS:-45}
      SNAPSHOT_CACHE_MAX_BYTES: ${SNAPSHOT_CACHE_MAX_BYTES:-67108864}

      # Source quarantine settings (Req 9.5).
      SOURCE_QUARANTINE_THRESHOLD: ${SOURCE_QUARANTINE_THRESHOLD:-3}
      SOURCE_QUARANTINE_SECONDS: ${SOURCE_QUARANTINE_SECONDS:-60}
    volumes:
      - backend-data:/data
    depends_on:
      - mediamtx

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: ring-mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"   # RTSP (sidecar + ffmpeg publish here)
      - "8888:8888"   # HLS (simulator subscribes here via backend)
      - "8889:8889"   # WHEP (tvOS app subscribes here via backend)
      - "8189:8189/udp" # WebRTC ICE
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro

  # go2rtc: native Ring → HLS/fMP4 bridge. When running on Linux this
  # stanza works in-compose. On macOS Docker Desktop the Ring WebRTC
  # ICE handshake fails from inside a bridged container, so we run the
  # go2rtc binary on the host and set GO2RTC_URL=http://host.docker.internal:1984
  # in .env. In that mode this service is started only on the "compose"
  # profile so a plain `docker compose up -d` leaves it off.
  go2rtc:
    profiles: ["compose"]
    image: alexxit/go2rtc:latest
    container_name: ring-go2rtc
    restart: unless-stopped
    ports:
      - "1984:1984"   # HTTP API + HLS + MP4 output
      - "8555:8555"   # WebRTC server (unused for Ring-client path)
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml
      - go2rtc-data:/data

  ring-sip-bridge:
    # On macOS Docker Desktop the Ring RTP path is unreliable from
    # inside a bridged container, so we run the sidecar on the host by
    # default and gate the in-compose variant behind the ``compose``
    # profile. Docker bring-up: ``docker compose --profile compose up``.
    profiles: ["compose"]
    build:
      context: ./ring-sip-bridge
    container_name: ring-sip-bridge
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MEDIAMTX_RTSP_URL: ${MEDIAMTX_RTSP_URL:-rtsp://mediamtx:8554/ring}
      # HLS output directory. The sidecar serves files under
      # ``/hls/<device_id>/`` from this root when a session requests
      # ``output=hls``.
      HLS_ROOT: /tmp/ring-hls
      # Turn on verbose ring-client-api + session logs while we're
      # bringing up the live SIP path. Harmless when unset.
      RING_SIP_BRIDGE_DEBUG: ${RING_SIP_BRIDGE_DEBUG:-}
    depends_on:
      - mediamtx

  ffmpeg:
    image: linuxserver/ffmpeg:latest
    container_name: ring-ffmpeg
    profiles: ["mock"]
    restart: unless-stopped
    depends_on:
      - mediamtx
    # Wait a moment for mediamtx to start, then publish a continuous test pattern.
    entrypoint: >
      sh -c "sleep 5 && ffmpeg -re -stream_loop -1
      -f lavfi -i 'testsrc2=size=1280x720:rate=30'
      -c:v libx264 -preset ultrafast -tune zerolatency -b:v 2M
      -f rtsp rtsp://mediamtx:8554/test"

volumes:
  backend-data:
  go2rtc-data:
