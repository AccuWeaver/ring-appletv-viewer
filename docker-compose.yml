# Docker Compose stack for local Ring Partner API testing and real-account dev.
#
# Services:
#   backend         — Python/FastAPI backend; pluggable adapter (mock or unofficial)
#   mediamtx        — WebRTC/RTSP media server
#   ring-sip-bridge — Node.js sidecar that negotiates Ring SIP sessions and
#                     republishes RTP as RTSP into mediamtx (only exercised
#                     when `RING_ADAPTER=unofficial`)
#   ffmpeg          — Test pattern generator. Only started when the ``mock``
#                     profile is active: `docker compose --profile mock up`.
#
# Usage:
#   docker compose up -d                       # mock or unofficial (no test pattern)
#   docker compose --profile mock up -d        # mock with ffmpeg test pattern
#   docker compose logs -f                     # tail logs
#   docker compose down                        # stop everything

services:
  backend:
    build:
      context: ./partner-auth-backend
    container_name: ring-partner-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Local dev credentials (not real Ring credentials).
      RING_CLIENT_ID: local_dev_client_id
      RING_CLIENT_SECRET: local_dev_client_secret
      RING_HMAC_KEY: 5E5CqTiFx16SS2V7Ipak1nvTBKQPaXipDLCjgjSj+Nk=
      APP_API_KEY: local-dev-api-key
      TOKEN_ENCRYPTION_KEY: z-6mRAl-NHWoVYqHFG_sEjGk9iy2lpnWyDWDpVBy-u0=
      DATABASE_PATH: /data/tokens.db
      LOG_LEVEL: INFO

      # Adapter selection (Req 7.1). Defaults to "mock" so `docker compose up`
      # works without any Ring credentials. Set to "unofficial" in an `.env`
      # file alongside this compose stack to drive a real Ring account.
      RING_ADAPTER: ${RING_ADAPTER:-mock}
      RING_REFRESH_TOKEN: ${RING_REFRESH_TOKEN:-}
      RING_MAX_CONCURRENT_STREAMS: ${RING_MAX_CONCURRENT_STREAMS:-2}
      RING_API_RATE_LIMIT_PER_MINUTE: ${RING_API_RATE_LIMIT_PER_MINUTE:-60}

      # Mock adapter's WHEP URL (reads from the ffmpeg test pattern). Unused
      # by the unofficial adapter, which assembles its own path from
      # MEDIAMTX_WHEP_BASE + the sidecar's rtsp_path.
      MEDIAMTX_WHEP_URL: ${MEDIAMTX_WHEP_URL:-http://mediamtx:8889/test/whep}

      # Unofficial adapter endpoints.
      MEDIAMTX_RTSP_URL: ${MEDIAMTX_RTSP_URL:-rtsp://mediamtx:8554/ring}
      MEDIAMTX_WHEP_BASE: ${MEDIAMTX_WHEP_BASE:-http://mediamtx:8889}
      RING_SIP_BRIDGE_URL: ${RING_SIP_BRIDGE_URL:-http://ring-sip-bridge:3000}
    volumes:
      - backend-data:/data
    depends_on:
      - mediamtx
      - ring-sip-bridge

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: ring-mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"   # RTSP (sidecar + ffmpeg publish here)
      - "8889:8889"   # WHEP (tvOS app subscribes here via backend)
      - "8189:8189/udp" # WebRTC ICE
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro

  ring-sip-bridge:
    build:
      context: ./ring-sip-bridge
    container_name: ring-sip-bridge
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MEDIAMTX_RTSP_URL: ${MEDIAMTX_RTSP_URL:-rtsp://mediamtx:8554/ring}
    depends_on:
      - mediamtx

  ffmpeg:
    image: linuxserver/ffmpeg:latest
    container_name: ring-ffmpeg
    profiles: ["mock"]
    restart: unless-stopped
    depends_on:
      - mediamtx
    # Wait a moment for mediamtx to start, then publish a continuous test pattern.
    entrypoint: >
      sh -c "sleep 5 && ffmpeg -re -stream_loop -1
      -f lavfi -i 'testsrc2=size=1280x720:rate=30'
      -c:v libx264 -preset ultrafast -tune zerolatency -b:v 2M
      -f rtsp rtsp://mediamtx:8554/test"

volumes:
  backend-data:
