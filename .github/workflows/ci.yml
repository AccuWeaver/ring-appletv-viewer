name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build (tvOS Simulator) + SwiftLint
    runs-on: macos-latest

    defaults:
      run:
        working-directory: RingAppleTV

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install SwiftLint + xcbeautify
        run: |
          brew install swiftlint
          brew install xcbeautify

      - name: Run SwiftLint (strict)
        run: swiftlint lint --strict --config .swiftlint.yml

      - name: Resolve Swift packages
        run: swift package resolve

      - name: Build (tvOS Simulator)
        # The app is tvOS-only. Previously CI ran `swift build` and `swift test`
        # which target the host macOS platform — but the code uses tvOS/iOS
        # UIKit types (`UIImage`) and SwiftUI modifiers (`navigationBarTrailing`,
        # `.autocapitalization`, `.card`) that don't exist on macOS.
        #
        # Building via `xcodebuild` against a tvOS Simulator destination mirrors
        # how the app is actually developed and run, so the CI signal matches
        # real developer workflows.
        #
        # TODO: add an Xcode test target to the .xcodeproj so `xcodebuild test`
        # can run the SPM test suite on the same tvOS destination. Until then
        # the build is the sole CI gate.
        run: |
          set -o pipefail
          xcodebuild \
            -project RingAppleTV.xcodeproj \
            -scheme RingAppleTV \
            -configuration Debug \
            -destination 'generic/platform=tvOS Simulator' \
            -derivedDataPath build \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build 2>&1 | xcbeautify --renderer github-actions
