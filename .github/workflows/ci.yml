name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: RingAppleTV

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict --config .swiftlint.yml

      - name: Resolve Swift packages
        run: swift package resolve

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test --enable-code-coverage

      - name: Generate code coverage report
        run: |
          BIN_PATH=$(swift build --show-bin-path)
          XCTEST_PATH=$(find "$BIN_PATH" -name '*.xctest' -type d | head -1)
          if [ -n "$XCTEST_PATH" ]; then
            EXEC_PATH="$XCTEST_PATH/Contents/MacOS/$(basename "$XCTEST_PATH" .xctest)"
          else
            EXEC_PATH=$(find "$BIN_PATH" -name 'RingAppleTVPackageTests' -type f | head -1)
          fi
          PROFDATA=$(find .build -name 'default.profdata' -type f | head -1)
          if [ -n "$EXEC_PATH" ] && [ -n "$PROFDATA" ]; then
            xcrun llvm-cov report "$EXEC_PATH" -instr-profile="$PROFDATA" -ignore-filename-regex='Tests/|\.build/'
            xcrun llvm-cov export "$EXEC_PATH" -instr-profile="$PROFDATA" -format=lcov -ignore-filename-regex='Tests/|\.build/' > coverage.lcov
            echo "Coverage report generated at RingAppleTV/coverage.lcov"
          else
            echo "Warning: Could not locate profdata or test binary for coverage report"
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: RingAppleTV/coverage.lcov
          if-no-files-found: warn
